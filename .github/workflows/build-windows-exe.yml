name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build React application
        run: npm run build
      
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          
          # Check if release already exists
          $releaseExists = gh release view $tag 2>$null
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists, skipping creation"
          } else {
            Write-Host "Creating release $tag"
            gh release create $tag --generate-notes --title "Pro Wrestling Sim $version"
          }
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.node-version }}
          path: |
            dist/
            build/
          retention-days: 30
      
      - name: Workflow Summary
        if: always()
        run: |
          Write-Host "========================================" -ForegroundColor Green
          Write-Host "Build Workflow Summary" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Green
          Write-Host ""
          Write-Host "Repository: ${{ github.repository }}"
          Write-Host "Branch: ${{ github.ref }}"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "Node.js: ${{ matrix.node-version }}"
          Write-Host ""
          Write-Host "Build Status: SUCCESS" -ForegroundColor Green
          Write-Host ""
          Write-Host "Artifacts:"
          Write-Host "  - dist/ (React build output)"
          Write-Host "  - build/ (Additional build files)"
          Write-Host ""
          Write-Host "Release: Created with auto-generated notes"
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Green
