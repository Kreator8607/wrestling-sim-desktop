name: Weekly Maintenance Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  maintenance-check:
    runs-on: ubuntu-latest
    name: Maintenance Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      
      - name: Run maintenance check script
        run: |
          chmod +x scripts/maintenance-check.sh
          ./scripts/maintenance-check.sh
      
      - name: Upload maintenance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-reports
          path: |
            maintenance-report-*.md
            maintenance-check-*.log
          retention-days: 30
      
      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Vulnerabilities found in maintenance check',
              body: `
              ## Security Alert
              
              The weekly maintenance check found vulnerabilities in dependencies.
              
              **Action Required:**
              1. Review the maintenance report in the workflow artifacts
              2. Run \`npm audit fix\` to address issues
              3. Test thoroughly before deploying
              4. Create a PR with the fixes
              
              **Workflow:** [View Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
              `,
              labels: ['security', 'dependencies']
            })
      
      - name: Comment on PR if updates available
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reports = fs.readdirSync('.').filter(f => f.startsWith('maintenance-report-'));
            
            if (reports.length > 0) {
              const report = fs.readFileSync(reports[0], 'utf8');
              
              // Extract summary from report
              const summary = report.split('## Summary')[1]?.split('---')[0] || 'Check completed';
              
              console.log('Maintenance check completed');
              console.log(summary);
            }

  dependency-update:
    runs-on: ubuntu-latest
    name: Check for Dependency Updates
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      
      - name: Check for npm updates
        id: npm-check
        run: |
          npm outdated --json > outdated.json || true
          
          # Count outdated packages
          OUTDATED_COUNT=$(cat outdated.json | grep -o '"[^"]*"' | wc -l)
          echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
          
          # Display outdated packages
          echo "=== Outdated Packages ==="
          npm outdated || true
      
      - name: Check Node.js version
        id: node-check
        run: |
          CURRENT_NODE=$(node --version)
          echo "current_node=$CURRENT_NODE" >> $GITHUB_OUTPUT
          
          # Check for LTS updates
          echo "Current Node.js version: $CURRENT_NODE"
      
      - name: Create summary
        run: |
          echo "## 📊 Dependency Update Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Node.js" >> $GITHUB_STEP_SUMMARY
          echo "- Current: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- npm: $(npm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### npm Packages" >> $GITHUB_STEP_SUMMARY
          echo "- Outdated: ${{ steps.npm-check.outputs.outdated_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Review outdated packages and plan updates" >> $GITHUB_STEP_SUMMARY

  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      
      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit.json || true
          
          # Parse audit results
          CRITICAL=$(cat audit.json | grep -o '"critical":[0-9]*' | grep -o '[0-9]*' || echo "0")
          HIGH=$(cat audit.json | grep -o '"high":[0-9]*' | grep -o '[0-9]*' || echo "0")
          MODERATE=$(cat audit.json | grep -o '"moderate":[0-9]*' | grep -o '[0-9]*' || echo "0")
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          
          # Display results
          echo "=== Security Audit Results ==="
          echo "Critical: $CRITICAL"
          echo "High: $HIGH"
          echo "Moderate: $MODERATE"
      
      - name: Create security report
        run: |
          echo "## 🔒 Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
          echo "- Critical: ${{ steps.audit.outputs.critical }}" >> $GITHUB_STEP_SUMMARY
          echo "- High: ${{ steps.audit.outputs.high }}" >> $GITHUB_STEP_SUMMARY
          echo "- Moderate: ${{ steps.audit.outputs.moderate }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.audit.outputs.critical }}" -gt 0 ] || [ "${{ steps.audit.outputs.high }}" -gt 0 ]; then
            echo "⚠️  **Action Required:** Address critical/high vulnerabilities immediately" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** No critical or high vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Fail if critical vulnerabilities
        if: steps.audit.outputs.critical > 0
        run: |
          echo "Critical vulnerabilities found!"
          exit 1

  actions-update-check:
    runs-on: ubuntu-latest
    name: GitHub Actions Update Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for deprecated actions
        run: |
          echo "## 🔄 GitHub Actions Update Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for deprecated action versions
          DEPRECATED_V3=$(grep -r "actions/.*@v3" .github/workflows/ || echo "")
          DEPRECATED_V2=$(grep -r "actions/.*@v2" .github/workflows/ || echo "")
          
          if [ -n "$DEPRECATED_V3" ]; then
            echo "⚠️  Found deprecated @v3 actions:" >> $GITHUB_STEP_SUMMARY
            echo "$DEPRECATED_V3" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "$DEPRECATED_V2" ]; then
            echo "⚠️  Found deprecated @v2 actions:" >> $GITHUB_STEP_SUMMARY
            echo "$DEPRECATED_V2" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -z "$DEPRECATED_V3" ] && [ -z "$DEPRECATED_V2" ]; then
            echo "✅ All GitHub Actions are up to date" >> $GITHUB_STEP_SUMMARY
          fi

  report-summary:
    runs-on: ubuntu-latest
    name: Report Summary
    needs: [maintenance-check, dependency-update, security-audit, actions-update-check]
    if: always()
    
    steps:
      - name: Create final summary
        run: |
          echo "## ✅ Weekly Maintenance Check Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Maintenance Check: ${{ needs.maintenance-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Update: ${{ needs.dependency-update.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actions Update: ${{ needs.actions-update-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the maintenance reports in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Address any vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          echo "3. Update outdated packages" >> $GITHUB_STEP_SUMMARY
          echo "4. Update deprecated GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "5. Test all changes thoroughly" >> $GITHUB_STEP_SUMMARY
