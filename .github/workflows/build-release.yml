name: Build and Release v3.0.0

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build React app
        run: npm run react-build
      
      - name: Copy Electron entry point
        run: npm run copy-electron
      
      - name: Build Electron app
        run: npx electron-builder --win --publish never
      
      - name: Generate checksums
        run: |
          $files = Get-ChildItem -Path "dist" -Filter "*.exe"
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash
            "$hash  $($file.Name)" | Out-File -FilePath "dist/checksums.txt" -Append
          }
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Pro Wrestling Sim ${{ github.ref }}
          body_path: CHANGELOG_v3.0.0.md
          draft: false
          prerelease: false
          files: |
            ./dist/Pro-Wrestling-Sim-3.0.0.exe
            ./dist/checksums.txt
