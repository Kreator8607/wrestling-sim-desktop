name: Generate Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 4.0.0)'
        required: true
      previous_tag:
        description: 'Previous tag for comparison (e.g., v3.0.0)'
        required: true

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Determine version and previous tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Extract version from tag (e.g., v4.0.0 -> 4.0.0)
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG=$GITHUB_REF_NAME
            
            # Get previous tag
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 $TAG^ 2>/dev/null || echo "v0.0.0")
          else
            # Manual workflow dispatch
            VERSION=${{ github.event.inputs.version }}
            TAG=v$VERSION
            PREVIOUS_TAG=${{ github.event.inputs.previous_tag }}
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "Previous Tag: $PREVIOUS_TAG"

      - name: Generate release notes
        id: generate
        run: |
          python3 generate-release-notes.py \
            -v ${{ steps.version.outputs.VERSION }} \
            -p ${{ steps.version.outputs.PREVIOUS_TAG }} \
            -o RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md \
            --verbose

      - name: Display generated release notes
        run: |
          echo "=== Generated Release Notes ==="
          cat RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md
          echo "=============================="

      - name: Upload release notes as artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md
          retention-days: 30

      - name: Create GitHub Release with notes
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md
          draft: false
          prerelease: false
          files: |
            RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release notes to repository
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Copy release notes to docs folder
          mkdir -p docs/releases
          cp RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md docs/releases/
          
          # Commit if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add docs/releases/RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md
            git commit -m "docs: Add release notes for v${{ steps.version.outputs.VERSION }}"
            git push
          fi

      - name: Create Pull Request with release notes
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "docs: Add release notes for v${{ steps.version.outputs.VERSION }}"
          title: "Release Notes for v${{ steps.version.outputs.VERSION }}"
          body: |
            # Release Notes for v${{ steps.version.outputs.VERSION }}
            
            Automatically generated release notes based on commits between ${{ steps.version.outputs.PREVIOUS_TAG }} and ${{ steps.version.outputs.TAG }}.
            
            Please review and merge when ready.
          branch: release-notes-${{ steps.version.outputs.VERSION }}
          delete-branch: true

      - name: Post workflow summary
        run: |
          echo "## Release Notes Generated ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Tag**: ${{ steps.version.outputs.PREVIOUS_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**File**: RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes Preview" >> $GITHUB_STEP_SUMMARY
          echo '```markdown' >> $GITHUB_STEP_SUMMARY
          head -50 RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View full release notes](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }})" >> $GITHUB_STEP_SUMMARY
